    // -------- RENDER FUNCTION (updates permalink in address bar) --------
    function renderPage(pageId) {
      const page = pages[pageId];
      if (!page) return;
      // update meta
      document.title = page.title;
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', page.description);
      // update content
      const contentDiv = document.getElementById('page-content');
      contentDiv.innerHTML = page.content;
      // update active nav
      document.querySelectorAll('nav ul li a').forEach(link => link.classList.remove('active'));
      const activeLink = document.querySelector(`nav ul li a[data-page="${pageId}"]`);
      if (activeLink) activeLink.classList.add('active');
      // push state with UNIQUE PERMALINK
      const permalink = page.permalink || '/';
      window.history.pushState({ page: pageId }, page.title, permalink);
    }

    // -------- NAVIGATION EVENTS --------
    document.querySelectorAll('nav ul li a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const page = link.dataset.page;
        if (page && pages[page]) {
          renderPage(page);
        }
      });
    });

    // -------- BROWSER BACK/FORWARD (restores permalink) --------
    window.addEventListener('popstate', (e) => {
      if (e.state && e.state.page && pages[e.state.page]) {
        renderPage(e.state.page);
      } else {
        renderPage('home');
      }
    });

    // -------- INITIAL PAGE (home) --------
    renderPage('home');
  </script>
